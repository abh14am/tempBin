<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivateBin - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
        th { background-color: var(--bg-surface); }
        .danger-text { color: var(--danger); font-weight: 500; }
        .success-text { color: var(--success-text); font-weight: 500; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-container" onclick="window.location.href='/'">
            <div class="logo-icon-bg">
                <span style="font-weight:bold;">!</span>
            </div>
            <span>PrivateBin Admin</span>
        </div>
    </nav>
    <main>
        <h3>Active Bins</h3>
        <p class="text-muted text-sm mb-4">Note: Due to our zero-knowledge architecture, text content and tags are thoroughly encrypted via keys strictly stored in user's browser histories. Only raw metadata is readable to the server.</p>
        
        <div class="panel">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Created</th>
                        <th>Title</th>
                        <th>Burn?</th>
                        <th>Password?</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr><td colspan="6">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchAdminData() {
            try {
                // The browser will inherently handle the Basic Auth Prompt pop-up before proceeding!
                const res = await fetch('/api/notes/admin/list');
                if (!res.ok) {
                    if (res.status === 401) {
                        document.getElementById('adminTableBody').innerHTML = '<tr><td colspan="6" class="danger-text">Authentication required or invalid credentials! Refresh to retry.</td></tr>';
                    } else {
                        throw new Error("HTTP " + res.status);
                    }
                    return;
                }
                const data = await res.json();
                renderTable(data);
            } catch(e) {
                document.getElementById('adminTableBody').innerHTML = `<tr><td colspan="6" class="danger-text">Failed to connect: ${e.message}</td></tr>`;
            }
        }

        function renderTable(notes) {
            const tbody = document.getElementById('adminTableBody');
            if (notes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-muted">No bins exist on server.</td></tr>';
                return;
            }

            tbody.innerHTML = notes.map(n => `
                <tr>
                    <td style="font-family: monospace;">${n.id}</td>
                    <td>${new Date(n.created_at * 1000).toLocaleString()}</td>
                    <td>${n.title || '<span class="text-muted">Untitled</span>'}</td>
                    <td class="${n.is_burn === 'true' ? 'danger-text' : ''}">${n.is_burn === 'true' ? 'Yes' : 'No'}</td>
                    <td class="${n.has_password === 'true' ? 'success-text' : ''}">${n.has_password === 'true' ? 'Yes' : 'No'}</td>
                    <td><button class="btn danger" onclick="deleteNote('${n.id}')">Delete</button></td>
                </tr>
            `).join('');
        }

        async function deleteNote(id) {
            if(!confirm("Force delete this bin?")) return;
            try {
                const res = await fetch(`/api/notes/${id}`, { method: 'DELETE' });
                if(res.ok) fetchAdminData();
                else alert("Delete failed!");
            } catch(e) {}
        }

        window.onload = fetchAdminData;
    </script>
</body>
</html>
